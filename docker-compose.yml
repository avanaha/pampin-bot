version: '3.8'

services:
  pampin-bot:
    build: .
    container_name: pampin-bot
    restart: unless-stopped
    environment:
      - MAX_BOT_TOKEN=${MAX_BOT_TOKEN}
      - GROUP_ID=${GROUP_ID}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - PORT=${PORT:-3000}
      - TIMEZONE=${TIMEZONE:-Europe/Moscow}
      - DATABASE_PATH=/app/data/pampin.db
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
